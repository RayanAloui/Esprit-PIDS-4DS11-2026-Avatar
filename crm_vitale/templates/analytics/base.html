<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM Vitale Analytics{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background: #0F1923; color: #E8EDF2; min-height: 100vh; display: flex; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: #0D1B2A;
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
        }
        .sidebar-logo {
            padding: 28px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #FFFFFF;
        }
        .sidebar-logo p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .sidebar-nav { padding: 16px 12px; flex: 1; }
        .nav-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.35);
            padding: 8px 8px 4px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: rgba(255,255,255,0.65);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
            transition: all 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav-item.active { background: #1565C0; color: #FFFFFF; }
        .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }

        /* ── MAIN CONTENT ── */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 28px 32px;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .page-header {
            background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
            padding: 24px 28px;
            border-radius: 16px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .page-header h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
        .page-header p  { color: rgba(255,255,255,0.75); font-size: 0.9rem; margin-top: 4px; }

        /* ── KPI CARDS ── */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .kpi-card {
            border-radius: 14px;
            padding: 22px 18px;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .kpi-blue   { background: linear-gradient(135deg, #0D47A1, #1565C0); }
        .kpi-green  { background: linear-gradient(135deg, #1B5E20, #2E7D32); }
        .kpi-orange { background: linear-gradient(135deg, #BF360C, #E64A19); }
        .kpi-purple { background: linear-gradient(135deg, #4A148C, #6A1B9A); }
        .kpi-teal   { background: linear-gradient(135deg, #004D40, #00695C); }
        .kpi-red    { background: linear-gradient(135deg, #B71C1C, #C62828); }
        .kpi-navy   { background: linear-gradient(135deg, #1A237E, #283593); }
        .kpi-gold   { background: linear-gradient(135deg, #4E342E, #6D4C41); }

        .kpi-icon  { font-size: 1.5rem; margin-bottom: 10px; display: block; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; color: #fff; display: block; }
        .kpi-label { font-size: 0.73rem; color: rgba(255,255,255,0.65); display: block; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.7px; }
        .kpi-delta { font-size: 0.8rem; color: rgba(255,255,255,0.85); display: block; margin-top: 6px; }

        /* ── SECTION ── */
        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin: 28px 0 16px;
        }
        .section-title { font-size: 1.05rem; font-weight: 600; color: #64B5F6; white-space: nowrap; }
        .section-line  { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        /* ── CHARTS ── */
        .chart-grid-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; margin-bottom: 20px; }
        .chart-grid-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-full { margin-bottom: 20px; }
        .chart-card {
            background: #1A2744;
            border-radius: 16px;
            padding: 6px;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* ── TABLE ── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #1A2744;
            border-radius: 14px;
            overflow: hidden;
            font-size: 0.88rem;
        }
        .data-table th {
            background: #1565C0;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-table td {
            padding: 11px 16px;
            color: #E8EDF2;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(255,255,255,0.03); }

        /* ── BADGE ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-blue   { background: rgba(25,118,210,0.25); color: #90CAF9; }
        .badge-green  { background: rgba(46,125,50,0.25);  color: #A5D6A7; }
        .badge-orange { background: rgba(230,74,25,0.25);  color: #FFCC80; }
        .badge-red    { background: rgba(198,40,40,0.25);  color: #EF9A9A; }

        /* ── ALERT ── */
        .alert {
            background: rgba(25,118,210,0.15);
            border: 1px solid rgba(25,118,210,0.3);
            border-radius: 12px;
            padding: 20px 24px;
            color: #90CAF9;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
    <div class="sidebar-logo">
        <h2>💊 CRM Vitale</h2>
        <p>Analytics Dashboard</p>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main Menu</div>
        <a href="{% url 'overview' %}"    class="nav-item {% block nav_overview %}{% endblock %}">
            <span class="nav-icon">📊</span> Overview
        </a>
        <a href="{% url 'zones' %}"       class="nav-item {% block nav_zones %}{% endblock %}">
            <span class="nav-icon">🗺️</span> Zones
        </a>
        <a href="{% url 'delegates' %}"   class="nav-item {% block nav_delegates %}{% endblock %}">
            <span class="nav-icon">👥</span> Delegates
        </a>
        <a href="{% url 'pharmacies' %}"  class="nav-item {% block nav_pharmacies %}{% endblock %}">
            <span class="nav-icon">🏥</span> Pharmacies
        </a>
        <div class="nav-label" style="margin-top:12px">ML Models</div>
        <a href="{% url 'predictions' %}" class="nav-item {% block nav_predictions %}{% endblock %}">
            <span class="nav-icon">🔮</span> Predictions
     
</a>
    </div>
    <div class="sidebar-footer">
        DSO 3 · CRM Vitale · Tunisia<br>2019 – 2026
    </div>
</nav>

<!-- MAIN -->
<main class="main">
    {% block content %}{% endblock %}
</main>

</body>
</html>
