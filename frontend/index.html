<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALIA — Assistant Médical Vital</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #020617;
    --surface: #0f172a;
    --surface2: #1e293b;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --muted: #64748b;
    --blue: #3b82f6;
    --green: #10b981;
    --red: #f87171;
    --yellow: #fbbf24;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }

/* ── LANDING PAGE ─────────────────────────────────────── */
#landing {
    position: fixed; inset: 0; z-index: 999;
    background: radial-gradient(ellipse at 60% 40%, #0f1e40 0%, #020617 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 48px;
}
.landing-logo {
    font-size: 52px; font-weight: 900; letter-spacing: 8px; color: #93c5fd;
    text-shadow: 0 0 60px rgba(147,197,253,0.35);
}
.landing-sub { font-size: 15px; color: var(--muted); letter-spacing: 1.5px; margin-top: -36px; text-transform: uppercase; }
.mode-cards { display: flex; gap: 28px; }
.mode-card {
    width: 230px; padding: 32px 24px 28px;
    background: rgba(15,23,42,0.9);
    border: 1px solid var(--border);
    border-radius: 20px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    backdrop-filter: blur(12px);
}
.mode-card:hover { transform: translateY(-4px); }
.mode-card.commercial { border-color: rgba(59,130,246,0.3); }
.mode-card.commercial:hover { border-color: rgba(59,130,246,0.7); box-shadow: 0 0 40px rgba(59,130,246,0.15); }
.mode-card.training   { border-color: rgba(16,185,129,0.3); }
.mode-card.training:hover   { border-color: rgba(16,185,129,0.7); box-shadow: 0 0 40px rgba(16,185,129,0.15); }
.mode-icon { font-size: 38px; }
.mode-title { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
.mode-card.commercial .mode-title { color: #93c5fd; }
.mode-card.training   .mode-title { color: #6ee7b7; }
.mode-desc { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }

/* ── NAVBAR ───────────────────────────────────────────── */
.navbar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 200;
    background: rgba(9,18,40,0.95); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(14px);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
}
.nav-logo { font-size: 18px; font-weight: 900; color: #93c5fd; letter-spacing: 3px; }

/* Mode badge */
.mode-badge {
    padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    transition: all .3s;
}
.mode-badge.commercial { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.35); color: #93c5fd; }
.mode-badge.training   { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.35); color: #6ee7b7; }

/* Status badge */
.nav-status {
    margin-left: auto;
    padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.28); color: #93c5fd;
    transition: all .3s;
}
.nav-status.listening { color: var(--red);    border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.08); }
.nav-status.thinking  { color: var(--yellow); border-color: rgba(251,191,36,0.4);  background: rgba(251,191,36,0.08); }
.nav-status.speaking  { color: #6ee7b7;       border-color: rgba(110,231,183,0.4); background: rgba(110,231,183,0.08); }

/* Switch mode button */
.switch-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    transition: all .2s;
}
.switch-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

/* ── AVATAR FULLSCREEN ───────────────────────────────── */
#canvas-container { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }

/* ── BOTTOM CONTROLS ─────────────────────────────────── */
.controls {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    z-index: 100;
}


/* Mic button */
#micBtn {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(15,23,42,0.9); backdrop-filter: blur(10px);
    border: 2px solid rgba(59,130,246,0.4);
    color: #93c5fd; font-size: 32px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; box-shadow: 0 0 30px rgba(59,130,246,0.1);
}
#micBtn:hover:not(:disabled) { border-color: rgba(248,113,113,.65); color: var(--red); box-shadow: 0 0 40px rgba(248,113,113,.2); }
#micBtn.recording { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.7); color: var(--red); animation: pulse 1.1s infinite; }
#micBtn.training-mode { border-color: rgba(16,185,129,0.4); color: #6ee7b7; box-shadow: 0 0 30px rgba(16,185,129,0.1); }
#micBtn.training-mode:hover:not(:disabled) { border-color: rgba(248,113,113,.65); color: var(--red); }
#micBtn:disabled { opacity: .35; cursor: not-allowed; animation: none; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)} 50%{box-shadow:0 0 0 18px rgba(248,113,113,0)} }

.hint { font-size: 11px; color: var(--muted); letter-spacing: .5px; }

/* Training start button */
#startTrainingBtn {
    padding: 10px 28px; border-radius: 14px; font-size: 13px; font-weight: 700;
    background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.4);
    color: #6ee7b7; cursor: pointer; letter-spacing: .5px;
    transition: all .2s; display: none;
}
#startTrainingBtn:hover { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.7); }
#startTrainingBtn.visible { display: block; }

/* Training score indicator */
#scoreBar {
    display: none; align-items: center; gap: 10px;
    font-size: 11px; color: var(--muted); letter-spacing: .5px;
}
#scoreBar.visible { display: flex; }
.score-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .3s; }
.score-dot.good    { background: #6ee7b7; box-shadow: 0 0 6px rgba(110,231,183,.5); }
.score-dot.neutral { background: var(--yellow); }
.score-dot.bad     { background: var(--red); }
</style>
</head>

    <div>
        <div class="landing-logo">ALIA</div>

<div id="canvas-container"></div>

<!-- ══ BOTTOM CONTROLS ══════════════════════════════════ -->
<div class="controls" id="controls" style="display:none">
    <div id="scoreBar"><span>Interaction :</span></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══ BACKEND CONFIGURATION ═══════════════════════════════
const BACKEND_URL = 'http://localhost:8000';
// ═══ STATE ═══════════════════════════════════════════════
let currentMode = null;          // 'commercial' | 'training'
let trainingStarted = false;
let isProcessing = false;
let isRecording  = false;
let interactionCount = 0;

// ═══ AVATAR ══════════════════════════════════════════════
const av = {
    model:null, mixer:null, neck:null, spine1:null, spine2:null,
    leftShoulder:null, rightShoulder:null, leftArm:null, rightArm:null,
    jawMeshes:[], visemeMeshes:[], blinkMeshes:[], eyeLookMeshes:[],
};
const clock    = new THREE.Clock();
const freqData = new Uint8Array(64);
const timeData = new Uint8Array(64);
const LE = 0.24;
let scene, camera, renderer, analyzer, audioCtx;
let speaking=false;
let gx=0,gy=0,gtx=0,gty=0,gt=0;
let sI=0,sAA=0,sO=0,sE=0,sIv=0,sU=0,sCH=0,sSS=0,sFF=0,sPP=0,sSil=1,pE=0;

initScene();

function initScene(){
    scene  = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(28,1,0.1,1000);
    camera.position.set(0,1.55,2.5);
    renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    const c = document.getElementById('canvas-container');
    renderer.setSize(c.clientWidth,c.clientHeight);
    camera.aspect=c.clientWidth/c.clientHeight; camera.updateProjectionMatrix();
    c.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff,.75));
    const k=new THREE.DirectionalLight(0xffffff,1.1); k.position.set(1,2.5,2); scene.add(k);
    const f=new THREE.DirectionalLight(0x8bb8ff,.35); f.position.set(-2,1,1); scene.add(f);
    new GLTFLoader().load('../static/avatar.glb', gltf=>{
        av.model=gltf.scene; av.model.rotation.y=Math.PI+10.15; scene.add(av.model);
        if(gltf.animations.length){
            av.mixer=new THREE.AnimationMixer(av.model);
            const a=av.mixer.clipAction(gltf.animations[0]); a.setLoop(THREE.LoopRepeat,Infinity); a.play();
        }
        av.model.traverse(child=>{
            if(child.isBone){
                ({Neck:'neck',Spine1:'spine1',Spine2:'spine2',LeftShoulder:'leftShoulder',
                  RightShoulder:'rightShoulder',LeftArm:'leftArm',RightArm:'rightArm'}[child.name])
                && (av[({Neck:'neck',Spine1:'spine1',Spine2:'spine2',LeftShoulder:'leftShoulder',
                  RightShoulder:'rightShoulder',LeftArm:'leftArm',RightArm:'rightArm'}[child.name])]=child);
            }
            if(child.isSkinnedMesh&&child.morphTargetDictionary){
                const d=child.morphTargetDictionary;
                if(child.name.toLowerCase().includes('tongue')) return;
                if(d['jawOpen']!==undefined)
                    av.jawMeshes.push({mesh:child,jawOpen:d['jawOpen'],mouthOpen:d['mouthOpen']??null});
                if(d['viseme_aa']!==undefined)
                    av.visemeMeshes.push({mesh:child,aa:d['viseme_aa'],O:d['viseme_O'],E:d['viseme_E'],
                        I:d['viseme_I'],U:d['viseme_U'],CH:d['viseme_CH'],SS:d['viseme_SS'],
                        FF:d['viseme_FF'],PP:d['viseme_PP'],sil:d['viseme_sil']});
            }
        });
        restPose();
    });
    animate();
    new ResizeObserver(()=>{
        const c=document.getElementById('canvas-container');
        camera.aspect=c.clientWidth/c.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(c.clientWidth,c.clientHeight);
    }).observe(c);
}

function restPose(){
    if(av.leftShoulder)  av.leftShoulder.rotation.set(.1,0,.28);
    if(av.rightShoulder) av.rightShoulder.rotation.set(.1,0,-.28);
    if(av.leftArm)       av.leftArm.rotation.set(0,0,.75);
    if(av.rightArm)      av.rightArm.rotation.set(0,0,-.75);
    if(av.spine2)        av.spine2.rotation.x=.03;
}

function resetLip(){sI=sAA=sO=sE=sIv=sU=sCH=sSS=sFF=sPP=pE=0;sSil=1;}

function nc(w){
    let s=0; for(const k in w){w[k]=Math.max(0,w[k]);s+=w[k];}
    if(s>.00001)for(const k in w)w[k]/=s; return w;
}

function animate(){
    requestAnimationFrame(animate);
    const t=performance.now()*.001, d=clock.getDelta();
    if(av.mixer)av.mixer.update(d);
    if(!av.model){renderer.render(scene,camera);return;}

    if(av.neck){av.neck.rotation.y=Math.sin(t*.38)*.022;av.neck.rotation.z=Math.sin(t*.27)*.009;}
    if(av.spine1)av.spine1.rotation.x=.02+Math.sin(t*.55)*.007;

    const bT=Math.sin(t*3.6)>.965?1:0;
    for(const b of av.blinkMeshes){
        const inf=b.mesh.morphTargetInfluences;
        inf[b.blinkL]=THREE.MathUtils.lerp(inf[b.blinkL],bT,.42);
        if(b.blinkR!==null)inf[b.blinkR]=inf[b.blinkL];
    }

    gt-=d; if(gt<=0){gtx=(Math.random()-.5)*.28;gty=(Math.random()-.5)*.14;gt=2+Math.random()*2;}
    gx=THREE.MathUtils.lerp(gx,gtx,d*1.5); gy=THREE.MathUtils.lerp(gy,gty,d*1.5);
    for(const em of av.eyeLookMeshes){
        const inf=em.mesh.morphTargetInfluences;
        for(let i=0;i<inf.length;i++)inf[i]*=.85;
        const cl=v=>Math.max(0,Math.min(.4,v));
        if(gx>0&&em.inL !==null)inf[em.inL] =cl(gx);  if(gx<0&&em.outL!==null)inf[em.outL]=cl(-gx);
        if(gx>0&&em.outR!==null)inf[em.outR]=cl(gx);  if(gx<0&&em.inR !==null)inf[em.inR] =cl(-gx);
        if(gy>0&&em.upL  !==null)inf[em.upL]  =cl(gy); if(gy<0&&em.downL!==null)inf[em.downL]=cl(-gy);
        if(gy>0&&em.upR  !==null)inf[em.upR]  =cl(gy); if(gy<0&&em.downR!==null)inf[em.downR]=cl(-gy);
    }

    if(analyzer){
        analyzer.getByteFrequencyData(freqData); analyzer.getByteTimeDomainData(timeData);
        let sum=0; for(let i=0;i<freqData.length;i++){const v=freqData[i]/255;sum+=v*v;}
        sI=THREE.MathUtils.lerp(sI,Math.min(Math.max(0,Math.sqrt(sum/freqData.length)-.04)*3.2,1),.22);
        let lw=0,md=0,hi=0;
        for(let i=2;i<8;i++)lw+=freqData[i]/255; for(let i=8;i<18;i++)md+=freqData[i]/255; for(let i=18;i<34;i++)hi+=freqData[i]/255;
        const tot=Math.max(.0001,lw+md+hi),lN=lw/tot,mN=md/tot,hN=hi/tot;
        let te=0,zc=0,ps=(timeData[0]-128)/128;
        for(let i=0;i<timeData.length;i++){const s=(timeData[i]-128)/128;te+=s*s;if((s>=0&&ps<0)||(s<0&&ps>=0))zc++;ps=s;}
        te=Math.sqrt(te/timeData.length);
        const tr=Math.max(0,te-pE); pE=THREE.MathUtils.lerp(pE,te,.55);
        const fr=THREE.MathUtils.clamp(hN*.95+THREE.MathUtils.clamp(zc/16,0,1)*.65,0,1);
        const vw=nc({aa:lN*1.2+mN*.6,O:lN*1.35+mN*.25,E:hN*.9+mN*.8,I:hN*1.15+mN*.2,U:lN*1.1+hN*.15});
        const cb=THREE.MathUtils.clamp(sI*1.25,0,1);
        sAA=THREE.MathUtils.lerp(sAA,THREE.MathUtils.clamp(vw.aa*cb*1.35,0,1),LE);
        sO =THREE.MathUtils.lerp(sO, THREE.MathUtils.clamp(vw.O *cb*1.25,0,1),LE);
        sE =THREE.MathUtils.lerp(sE, THREE.MathUtils.clamp(vw.E *cb*1.25,0,1),LE);
        sIv=THREE.MathUtils.lerp(sIv,THREE.MathUtils.clamp(vw.I *cb*1.1, 0,1),LE);
        sU =THREE.MathUtils.lerp(sU, THREE.MathUtils.clamp(vw.U *cb*1.05,0,1),LE);
        sSS=THREE.MathUtils.lerp(sSS,THREE.MathUtils.clamp(fr*sI*.7,0,1),.28);
        sCH=THREE.MathUtils.lerp(sCH,THREE.MathUtils.clamp((fr*.45+tr*2.2)*sI,0,1),.28);
        sFF=THREE.MathUtils.lerp(sFF,THREE.MathUtils.clamp((fr*.35+hN*.25)*sI,0,1),.28);
        sPP=THREE.MathUtils.lerp(sPP,THREE.MathUtils.clamp(tr*4.8*sI,0,1),.34);
        sSil=THREE.MathUtils.lerp(sSil,speaking?Math.max(0,1-sI*3.1):1,.2);
        for(const vm of av.visemeMeshes){
            const inf=vm.mesh.morphTargetInfluences;
            inf[vm.aa]=THREE.MathUtils.lerp(inf[vm.aa],sAA,.24);
            if(vm.O !==undefined)inf[vm.O] =THREE.MathUtils.lerp(inf[vm.O], sO, .24);
            if(vm.E !==undefined)inf[vm.E] =THREE.MathUtils.lerp(inf[vm.E], sE, .24);
            if(vm.I !==undefined)inf[vm.I] =THREE.MathUtils.lerp(inf[vm.I], sIv,.24);
            if(vm.U !==undefined)inf[vm.U] =THREE.MathUtils.lerp(inf[vm.U], sU, .24);
            if(vm.CH!==undefined)inf[vm.CH]=THREE.MathUtils.lerp(inf[vm.CH],sCH*.75,.24);
            if(vm.SS!==undefined)inf[vm.SS]=THREE.MathUtils.lerp(inf[vm.SS],sSS*.7, .24);
            if(vm.FF!==undefined)inf[vm.FF]=THREE.MathUtils.lerp(inf[vm.FF],sFF*.65,.24);
            if(vm.PP!==undefined)inf[vm.PP]=THREE.MathUtils.lerp(inf[vm.PP],sPP*.85,.3);
            if(vm.sil!==undefined)inf[vm.sil]=THREE.MathUtils.lerp(inf[vm.sil],sSil,.22);
        }
        const vp=Math.max(sAA,sO,sE,sIv,sU);
        const vc=Math.abs(sAA-sO)+Math.abs(sAA-sE)+Math.abs(sO-sE)+Math.abs(sIv-sE);
        const jT=speaking?THREE.MathUtils.clamp(sI*.04+vp*.17+vc*.11+sAA*.1,0,.34):0;
        for(const jm of av.jawMeshes){
            const inf=jm.mesh.morphTargetInfluences;
            inf[jm.jawOpen]=THREE.MathUtils.lerp(inf[jm.jawOpen],jT,.26);
            if(jm.mouthOpen!==null)inf[jm.mouthOpen]=THREE.MathUtils.lerp(inf[jm.mouthOpen],jT*.3,.22);
        }
    }
    renderer.render(scene,camera);
}

// ═══ AUDIO + LIP SYNC ════════════════════════════════════
async function playAudio(url){
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')await audioCtx.resume();
    const audio=new Audio(url+'?t='+Date.now());
    audio.crossOrigin='anonymous';
    const src=audioCtx.createMediaElementSource(audio);
    analyzer=audioCtx.createAnalyser(); analyzer.fftSize=128;
    src.connect(analyzer); analyzer.connect(audioCtx.destination);
    resetLip(); speaking=true; setStatus('speaking','Parle');
    return new Promise(resolve=>{
        audio.addEventListener('ended',()=>{speaking=false;resetLip();analyzer=null;setStatus('','Standby');resolve();});
        audio.play();
    });
}

// ═══ UI HELPERS ═══════════════════════════════════════════
function setStatus(cls,label){
    const el=document.getElementById('status');
    el.className=`nav-status ${cls}`; el.textContent=label;
}

function setHint(t){ document.getElementById('hint').textContent=t; }

function addScoreDot(type){
    interactionCount++;
    const bar=document.getElementById('scoreBar');
    const dot=document.createElement('div');
    dot.className=`score-dot ${type}`;
    bar.appendChild(dot);
}

// ═══ MODE SELECTION ════════════════════════════════════════
window.selectMode = function(mode){
    currentMode=mode;
    document.getElementById('landing').style.display='none';
    document.getElementById('navbar').style.display='flex';
    document.getElementById('controls').style.display='flex';

    const badge=document.getElementById('modeBadge');
    const micBtn=document.getElementById('micBtn');

    if(mode==='commercial'){
        badge.className='mode-badge commercial'; badge.textContent='Mode Commercial';
        micBtn.className=''; setHint('Cliquez pour parler à ALIA');
        document.getElementById('startTrainingBtn').classList.remove('visible');
        document.getElementById('scoreBar').classList.remove('visible');
    } else {
        badge.className='mode-badge training'; badge.textContent='Mode Training';
        micBtn.className='training-mode'; setHint('Cliquez sur Démarrer pour commencer la simulation');
        document.getElementById('startTrainingBtn').classList.add('visible');
        document.getElementById('scoreBar').classList.add('visible');
        trainingStarted=false;
    }
};

window.goHome = function(){
    currentMode=null; trainingStarted=false;
    document.getElementById('landing').style.display='flex';
    document.getElementById('navbar').style.display='none';
    document.getElementById('controls').style.display='none';
    setStatus('','Standby');
};

// ═══ TRAINING START ════════════════════════════════════════
window.startTraining = async function(){
    if(isProcessing)return;
    isProcessing=true;
    document.getElementById('startTrainingBtn').style.display='none';
    setStatus('thinking','Préparation…');

    try {
        const r=await fetch(`${BACKEND_URL}/start_training`,{method:'POST'});
        const d=await r.json();
        if(d.text){ setHint('Répondez en cliquant sur le micro'); }
        if(d.audio_url) {await playAudio(`${BACKEND_URL}${d.audio_url}`);}
        trainingStarted=true;
    } catch(e){ console.error(e); setStatus('','Erreur'); }
    finally{ isProcessing=false; }
};

// ═══ MIC LOGIC ═════════════════════════════════════════════
let mediaRecorder=null, audioChunks=[];

async function toggleMic(){
    if(isRecording){ mediaRecorder.stop(); return; }
    if(isProcessing || !currentMode) return;
    if(currentMode==='training'&&!trainingStarted) return;

    try {
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        audioChunks=[];
        mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
        mediaRecorder.ondataavailable=e=>{ if(e.data.size>0)audioChunks.push(e.data); };

        mediaRecorder.onstop=async()=>{
            isRecording=false;
            const btn=document.getElementById('micBtn');
            btn.classList.remove('recording'); btn.textContent='🎤'; btn.disabled=true;
            stream.getTracks().forEach(t=>t.stop());
            setStatus('thinking','Transcription…'); setHint('Traitement…');

            // ① STT
            const blob=new Blob(audioChunks,{type:'audio/webm'});
            const fd=new FormData(); fd.append('audio',blob,'rec.webm');
            try {
                const r1=await fetch(`${BACKEND_URL}/listen`,{method:'POST',body:fd});
                const d1=await r1.json();
                const userText=(d1.text||'').trim();
                if(!userText){ setStatus('','Standby'); setHint('Répétez svp'); btn.disabled=false; return; }

                

                // ② RAG
                isProcessing=true;
                setStatus('thinking','Réflexion…');
                const r2=await fetch(`${BACKEND_URL}/ask_alia`,{
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({text:userText, mode:currentMode})
                });
                const d2=await r2.json();
                if(!d2.text){ setStatus('','Erreur'); btn.disabled=false; isProcessing=false; return; }

                // Score training
                if(currentMode==='training'){
                    const txt=d2.text.toLowerCase();
                    if(txt.includes('excellent')||txt.includes('très bien')||txt.includes('parfait'))
                        addScoreDot('good');
                    else if(txt.includes('incorrect')||txt.includes('erreur')||txt.includes('non'))
                        addScoreDot('bad');
                    else
                        addScoreDot('neutral');
                }


                // ③ Audio + lip sync
                if(d2.audio_url) {await playAudio(`${BACKEND_URL}${d2.audio_url}`);}
                else setStatus('','Standby');

            } catch(e){
                console.error(e); setStatus('','Erreur');
            } finally {
                isProcessing=false; btn.disabled=false;
                setHint(currentMode==='training'?'Répondez au médecin':'Cliquez pour parler à ALIA');
            }
        };

        mediaRecorder.start();
        isRecording=true;
        const btn=document.getElementById('micBtn');
        btn.classList.add('recording'); btn.textContent='⏹';
        setStatus('listening','Écoute…');
        setHint('Cliquez pour arrêter');

    } catch(e){
        console.error(e);
        alert('Accès microphone refusé. Vérifiez les permissions.');
    }
}

document.getElementById('micBtn').onclick=toggleMic;
</script>
