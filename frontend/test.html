<!DOCTYPE html>
<html>
<head>
    <title>ALIA - Mixamo Avatar</title>
    <style>
        body { margin: 0; overflow: hidden; }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: Arial;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="status">Chargement de l'avatar...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.Fog(0x0a0a2a, 5, 15);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1;

        // Lumières de studio
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        
        const keyLight = new THREE.DirectionalLight(0xfff5e6, 1);
        keyLight.position.set(2, 3, 3);
        keyLight.castShadow = true;
        scene.add(keyLight);
        
        const fillLight = new THREE.PointLight(0x6688aa, 0.5);
        fillLight.position.set(-1.5, 2, 2);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.4);
        backLight.position.set(0, 1.5, -2);
        scene.add(backLight);

        // Sol
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(3, 32),
            new THREE.MeshStandardMaterial({ color: 0x1a1a2e, metalness: 0.6, roughness: 0.3 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.8;
        floor.receiveShadow = true;
        scene.add(floor);

        // Charger l'avatar Mixamo
        // Mettez votre fichier .glb ici
        const loader = new GLTFLoader();
        loader.load('votre_avatar.glb', (gltf) => {
            const avatar = gltf.scene;
            avatar.scale.set(1.2, 1.2, 1.2);
            avatar.position.y = -0.5;
            avatar.traverse((node) => {
                if (node.isMesh) node.castShadow = true;
            });
            scene.add(avatar);
            
            document.getElementById('status').innerHTML = '✅ Avatar chargé - ALIA prête';
        }, undefined, (error) => {
            console.error(error);
            document.getElementById('status').innerHTML = '❌ Erreur chargement';
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
