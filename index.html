<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIA - Assistant Médical</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #3b82f6;
            --bg: #020617;
            --surface: #0f172a;
            --surface2: #1e293b;
            --border: rgba(255,255,255,0.07);
            --text: #e2e8f0;
            --muted: #64748b;
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, 'Inter', sans-serif; }

        /* Navbar */
        .navbar {
            height: 56px; flex-shrink: 0;
            background: rgba(9,18,40,0.97);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(14px);
            display: flex; align-items: center;
            padding: 0 24px; z-index: 200;
        }
        .nav-logo { font-size: 17px; font-weight: 800; color: #93c5fd; letter-spacing: 3px; margin-right: 36px; }
        .nav-links { display: flex; gap: 2px; flex: 1; }
        .nav-link {
            padding: 6px 16px; border-radius: 8px;
            font-size: 13px; color: var(--muted);
            cursor: pointer; text-decoration: none;
            transition: color .15s, background .15s;
        }
        .nav-link:hover  { color: var(--text); background: var(--surface2); }
        .nav-link.active { color: #93c5fd; background: rgba(59,130,246,0.12); }
        .nav-status {
            font-size: 11px; font-weight: 700;
            padding: 5px 14px; border-radius: 20px;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.28);
            color: #93c5fd; letter-spacing: 1.2px; text-transform: uppercase;
            transition: color .3s, border-color .3s, background .3s;
        }
        .nav-status.speaking { color: #6ee7b7; border-color: rgba(110,231,183,0.4); background: rgba(110,231,183,0.08); }
        .nav-status.thinking { color: #fbbf24; border-color: rgba(251,191,36,0.4);  background: rgba(251,191,36,0.08); }

        /* Main 2-column layout */
        .main { display: flex; height: calc(100vh - 56px); }

        /* Left: Chat */
        .chat-panel {
            width: 400px; flex-shrink: 0;
            display: flex; flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--surface);
        }
        .chat-header {
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
        }
        .chat-transcript {
            flex: 1; overflow-y: auto;
            padding: 16px; display: flex; flex-direction: column; gap: 14px;
        }
        .chat-transcript::-webkit-scrollbar { width: 3px; }
        .chat-transcript::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

        .msg { display: flex; flex-direction: column; max-width: 88%; }
        .msg.user { align-self: flex-end;   align-items: flex-end; }
        .msg.alia  { align-self: flex-start; align-items: flex-start; }
        .msg-sender { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
        .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.55; }
        .msg.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .msg.alia .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* Typing indicator */
        .msg-thinking { display: flex; gap: 5px; padding: 12px 15px; background: var(--surface2); border-radius: 16px; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.3s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: .18s; }
        .dot:nth-child(3) { animation-delay: .36s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }

        /* Input row */
        .input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface); }
        #userInput {
            flex: 1; padding: 11px 16px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 14px; outline: none;
            transition: border-color .15s;
        }
        #userInput:focus { border-color: rgba(59,130,246,0.5); }
        #userInput::placeholder { color: var(--muted); }
        #userInput:disabled { opacity: .45; }
        #sendBtn {
            padding: 0 20px; background: var(--primary);
            border: none; border-radius: 12px;
            color: #fff; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: opacity .15s;
        }
        #sendBtn:hover    { opacity: .85; }
        #sendBtn:disabled { opacity: .35; cursor: not-allowed; }

        /* Right: Avatar */
        .avatar-panel { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
        #canvas-container { position: absolute; inset: 0; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">ALIA</div>
    <div class="nav-links">
        <a class="nav-link" href="#">Accueil</a>
        <a class="nav-link active" href="#">ALIA</a>
        <a class="nav-link" href="#">Carte</a>
    </div>
    <div class="nav-status" id="status">Standby</div>
</nav>

<div class="main">
    <!-- Left: chat transcript -->
    <div class="chat-panel">
        <div class="chat-header">Conversation</div>
        <div class="chat-transcript" id="transcript">
            <div class="msg alia">
                <div class="msg-sender">ALIA</div>
                <div class="msg-bubble">Bonjour, je suis ALIA votre assistant médical commercial. Comment puis-je vous aider ?</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Posez votre question à ALIA…" autocomplete="off">
            <button id="sendBtn">Envoyer</button>
        </div>
    </div>

    <!-- Right: 3D avatar -->
    <div class="avatar-panel">
        <div id="canvas-container"></div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.162.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const avatar = {
        model: null, mixer: null,
        neck: null, head: null,
        leftShoulder: null, rightShoulder: null,
        leftArm: null, rightArm: null,
        spine1: null, spine2: null,
        jawMeshes:     [],  // Head_Mesh, Teeth_Mesh, Tongue_Mesh
        visemeMeshes: [],
        blinkMeshes:   [],  // EyeAO_Mesh, Eyelash_Mesh
        eyeLookMeshes: [],  // Eye_Mesh, EyeAO_Mesh
    };

    const clock = new THREE.Clock();
    const audioData = new Uint8Array(64);
    const timeData = new Uint8Array(64);
    const LIPEASE = 0.24;
    let scene, camera, renderer, analyzer, audioCtx;
    let isSpeaking = false, isProcessing = false;
    let gazeDirX = 0, gazeDirY = 0, gazeTargetX = 0, gazeTargetY = 0, gazeTimer = 0;
    let smoothIntensity = 0;
    let smoothAA = 0, smoothO = 0, smoothE = 0, smoothI = 0, smoothU = 0;
    let smoothCH = 0, smoothSS = 0, smoothFF = 0, smoothPP = 0, smoothSil = 1;
    let prevEnergy = 0;
    init();

    function init() {
        scene  = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(28, 1, 0.1, 1000);
        camera.position.set(0, 1.55, 2.5);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const container = document.getElementById('canvas-container');
        renderer.setSize(container.clientWidth, container.clientHeight);
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        const key = new THREE.DirectionalLight(0xffffff, 1.1);
        key.position.set(1, 2.5, 2);
        const fill = new THREE.DirectionalLight(0x8bb8ff, 0.35);
        fill.position.set(-2, 1, 1);
        scene.add(key, fill);

        new GLTFLoader().load('/static/avatar.glb', (gltf) => {
            avatar.model = gltf.scene;

// FIX ROTATION (face camera)
avatar.model.rotation.y = Math.PI+10;

// fine-tune (adjust if slightly off)
avatar.model.rotation.y += 0.15;


scene.add(avatar.model);

            if (gltf.animations.length > 0) {
                avatar.mixer = new THREE.AnimationMixer(avatar.model);
                const action = avatar.mixer.clipAction(gltf.animations[0]);
                action.setLoop(THREE.LoopRepeat, Infinity);
                action.play();
            }

            avatar.model.traverse((child) => {
                if (child.isBone) {
                    switch (child.name) {
                        case 'Neck':          avatar.neck          = child; break;
                        case 'Head':          avatar.head          = child; break;
                        case 'LeftShoulder':  avatar.leftShoulder  = child; break;
                        case 'RightShoulder': avatar.rightShoulder = child; break;
                        case 'LeftArm':       avatar.leftArm       = child; break;
                        case 'RightArm':      avatar.rightArm      = child; break;
                        case 'Spine1':        avatar.spine1        = child; break;
                        case 'Spine2':        avatar.spine2        = child; break;
                    }
                }

                if (child.isSkinnedMesh && child.morphTargetDictionary) {
    const d = child.morphTargetDictionary;

    const name = child.name.toLowerCase();

    // ❌ ignore tongue
    if (name.includes("tongue")) return;

    // JAW
    if (d['jawOpen'] !== undefined) {
        avatar.jawMeshes.push({
            mesh: child,
            jawOpen: d['jawOpen'],
            mouthOpen: d['mouthOpen'] ?? null,
        });
    }

    // VISEMES
    if (d['viseme_aa'] !== undefined) {
        avatar.visemeMeshes.push({
            mesh: child,
            aa: d['viseme_aa'],
            O: d['viseme_O'],
            E: d['viseme_E'],
            I: d['viseme_I'],
            U: d['viseme_U'],
            CH: d['viseme_CH'],
            SS: d['viseme_SS'],
            FF: d['viseme_FF'],
            PP: d['viseme_PP'],
            sil: d['viseme_sil'],
        });
    }
}
            });

            applyRestPose();
        });

        animate();

        new ResizeObserver(() => {
            const c = document.getElementById('canvas-container');
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(c.clientWidth, c.clientHeight);
        }).observe(container);
    }

    function applyRestPose() {
        if (avatar.leftShoulder)  avatar.leftShoulder.rotation.set(0.1,  0,  0.28);
        if (avatar.rightShoulder) avatar.rightShoulder.rotation.set(0.1,  0, -0.28);
        if (avatar.leftArm)       avatar.leftArm.rotation.set(0, 0,  0.75);
        if (avatar.rightArm)      avatar.rightArm.rotation.set(0, 0, -0.75);
        if (avatar.spine2)        avatar.spine2.rotation.x = 0.03;
    }

    function resetLipState() {
        smoothIntensity = 0;
        smoothAA = 0; smoothO = 0; smoothE = 0; smoothI = 0; smoothU = 0;
        smoothCH = 0; smoothSS = 0; smoothFF = 0; smoothPP = 0; smoothSil = 1;
        prevEnergy = 0;
    }

    function normalizeCompetitive(weights) {
        let sum = 0;
        for (const k in weights) {
            const w = Math.max(0, weights[k]);
            weights[k] = w;
            sum += w;
        }
        if (sum <= 0.00001) return weights;
        for (const k in weights) weights[k] /= sum;
        return weights;
    }

    function animate() {
        requestAnimationFrame(animate);
        const time  = performance.now() * 0.001;
        const delta = clock.getDelta();

        if (avatar.mixer) avatar.mixer.update(delta);
        if (!avatar.model) { renderer.render(scene, camera); return; }

        // Idle neck sway
        if (avatar.neck) {
            avatar.neck.rotation.y = Math.sin(time * 0.38) * 0.022;
            avatar.neck.rotation.z = Math.sin(time * 0.27) * 0.009;
        }
        // Breathing
        if (avatar.spine1) avatar.spine1.rotation.x = 0.02 + Math.sin(time * 0.55) * 0.007;

        // Blinking
        const blinkTarget = Math.sin(time * 3.6) > 0.965 ? 1 : 0;
        for (const bm of avatar.blinkMeshes) {
            const inf = bm.mesh.morphTargetInfluences;
            inf[bm.blinkL] = THREE.MathUtils.lerp(inf[bm.blinkL], blinkTarget, 0.42);
            if (bm.blinkR !== null) inf[bm.blinkR] = inf[bm.blinkL];
        }

        // Eye gaze drift
        gazeTimer -= delta;
        if (gazeTimer <= 0) {
            gazeTargetX = (Math.random() - 0.5) * 0.28;
            gazeTargetY = (Math.random() - 0.5) * 0.14;
            gazeTimer = 2 + Math.random() * 2;
        }
        gazeDirX = THREE.MathUtils.lerp(gazeDirX, gazeTargetX, delta * 1.5);
        gazeDirY = THREE.MathUtils.lerp(gazeDirY, gazeTargetY, delta * 1.5);

for (const em of avatar.eyeLookMeshes) {
    const inf = em.mesh.morphTargetInfluences;

    const x = gazeDirX;
    const y = gazeDirY;

    // decay previous values (prevents stacking explosion)
    for (let i = 0; i < inf.length; i++) {
        inf[i] *= 0.85;
    }

    const clamp = (v) => Math.max(0, Math.min(0.4, v));

    if (x > 0 && em.inL !== null) inf[em.inL] = clamp(x);
    if (x < 0 && em.outL !== null) inf[em.outL] = clamp(-x);

    if (x > 0 && em.outR !== null) inf[em.outR] = clamp(x);
    if (x < 0 && em.inR !== null) inf[em.inR] = clamp(-x);

    if (y > 0 && em.upL !== null) inf[em.upL] = clamp(y);
    if (y < 0 && em.downL !== null) inf[em.downL] = clamp(-y);

    if (y > 0 && em.upR !== null) inf[em.upR] = clamp(y);
    if (y < 0 && em.downR !== null) inf[em.downR] = clamp(-y);
}

        // Lip sync
if (analyzer) {
    analyzer.getByteFrequencyData(audioData);
    analyzer.getByteTimeDomainData(timeData);

    let sum = 0;
    for (let i = 0; i < audioData.length; i++) {
        const v = audioData[i] / 255;
        sum += v * v;
    }
    const rms = Math.sqrt(sum / audioData.length);

    // Speech intensity envelope.
    const noiseGate = 0.04;
    const gated = Math.max(0, rms - noiseGate);
    const rawIntensity = Math.min(gated * 3.2, 1.0);

    smoothIntensity = THREE.MathUtils.lerp(smoothIntensity, rawIntensity, 0.22);

    // Spectral bands.
    let low = 0, mid = 0, high = 0;
    for (let i = 2; i < 8; i++) low += audioData[i] / 255;
    for (let i = 8; i < 18; i++) mid += audioData[i] / 255;
    for (let i = 18; i < 34; i++) high += audioData[i] / 255;

    const total = Math.max(0.0001, low + mid + high);
    const lowN = low / total;
    const midN = mid / total;
    const highN = high / total;

    // Time-domain transients / zero-crossings.
    let tdEnergy = 0;
    let zeroCrossings = 0;
    let prevSample = (timeData[0] - 128) / 128;
    for (let i = 0; i < timeData.length; i++) {
        const sample = (timeData[i] - 128) / 128;
        tdEnergy += sample * sample;
        if ((sample >= 0 && prevSample < 0) || (sample < 0 && prevSample >= 0)) zeroCrossings++;
        prevSample = sample;
    }
    tdEnergy = Math.sqrt(tdEnergy / timeData.length);
    const transient = Math.max(0, tdEnergy - prevEnergy);
    prevEnergy = THREE.MathUtils.lerp(prevEnergy, tdEnergy, 0.55);

    const zcrN = THREE.MathUtils.clamp(zeroCrossings / 16, 0, 1);
    const frication = THREE.MathUtils.clamp(highN * 0.95 + zcrN * 0.65, 0, 1);

    // Competitive vowel weighting (prevents "all visemes active").
    const vowelWeights = normalizeCompetitive({
        aa: lowN * 1.2 + midN * 0.6,
        O:  lowN * 1.35 + midN * 0.25,
        E:  highN * 0.9 + midN * 0.8,
        I:  highN * 1.15 + midN * 0.2,
        U:  lowN * 1.1 + highN * 0.15
    });

    const consonantBoost = THREE.MathUtils.clamp(smoothIntensity * 1.25, 0, 1);
    const targetAA = THREE.MathUtils.clamp(vowelWeights.aa * consonantBoost * 1.35, 0, 1);
    const targetO  = THREE.MathUtils.clamp(vowelWeights.O  * consonantBoost * 1.25, 0, 1);
    const targetE  = THREE.MathUtils.clamp(vowelWeights.E  * consonantBoost * 1.25, 0, 1);
    const targetI  = THREE.MathUtils.clamp(vowelWeights.I  * consonantBoost * 1.1, 0, 1);
    const targetU  = THREE.MathUtils.clamp(vowelWeights.U  * consonantBoost * 1.05, 0, 1);

    const targetSS = THREE.MathUtils.clamp(frication * smoothIntensity * 0.7, 0, 1);
    const targetCH = THREE.MathUtils.clamp((frication * 0.45 + transient * 2.2) * smoothIntensity, 0, 1);
    const targetFF = THREE.MathUtils.clamp((frication * 0.35 + highN * 0.25) * smoothIntensity, 0, 1);
    const targetPP = THREE.MathUtils.clamp(transient * 4.8 * smoothIntensity, 0, 1);
    const targetSil = isSpeaking ? Math.max(0, 1 - smoothIntensity * 3.1) : 1;

    smoothAA = THREE.MathUtils.lerp(smoothAA, targetAA, LIPEASE);
    smoothO  = THREE.MathUtils.lerp(smoothO, targetO, LIPEASE);
    smoothE  = THREE.MathUtils.lerp(smoothE, targetE, LIPEASE);
    smoothI  = THREE.MathUtils.lerp(smoothI, targetI, LIPEASE);
    smoothU  = THREE.MathUtils.lerp(smoothU, targetU, LIPEASE);
    smoothSS = THREE.MathUtils.lerp(smoothSS, targetSS, 0.28);
    smoothCH = THREE.MathUtils.lerp(smoothCH, targetCH, 0.28);
    smoothFF = THREE.MathUtils.lerp(smoothFF, targetFF, 0.28);
    smoothPP = THREE.MathUtils.lerp(smoothPP, targetPP, 0.34);
    smoothSil = THREE.MathUtils.lerp(smoothSil, targetSil, 0.2);

    for (const vm of avatar.visemeMeshes) {
        const inf = vm.mesh.morphTargetInfluences;

        inf[vm.aa] = THREE.MathUtils.lerp(inf[vm.aa], smoothAA, 0.24);
        if (vm.O !== undefined)
            inf[vm.O] = THREE.MathUtils.lerp(inf[vm.O], smoothO, 0.24);
        if (vm.E !== undefined)
            inf[vm.E] = THREE.MathUtils.lerp(inf[vm.E], smoothE, 0.24);
        if (vm.I !== undefined)
            inf[vm.I] = THREE.MathUtils.lerp(inf[vm.I], smoothI, 0.24);
        if (vm.U !== undefined)
            inf[vm.U] = THREE.MathUtils.lerp(inf[vm.U], smoothU, 0.24);
        if (vm.CH !== undefined)
            inf[vm.CH] = THREE.MathUtils.lerp(inf[vm.CH], smoothCH * 0.75, 0.24);
        if (vm.SS !== undefined)
            inf[vm.SS] = THREE.MathUtils.lerp(inf[vm.SS], smoothSS * 0.7, 0.24);
        if (vm.FF !== undefined)
            inf[vm.FF] = THREE.MathUtils.lerp(inf[vm.FF], smoothFF * 0.65, 0.24);
        if (vm.PP !== undefined)
            inf[vm.PP] = THREE.MathUtils.lerp(inf[vm.PP], smoothPP * 0.85, 0.3);
        if (vm.sil !== undefined) {
            inf[vm.sil] = THREE.MathUtils.lerp(inf[vm.sil], smoothSil, 0.22);
        }
    }

    // Jaw follows openness and articulation, with strict clamp.
    const visemePeak = Math.max(smoothAA, smoothO, smoothE, smoothI, smoothU);
    const visemeContrast =
        Math.abs(smoothAA - smoothO) +
        Math.abs(smoothAA - smoothE) +
        Math.abs(smoothO - smoothE) +
        Math.abs(smoothI - smoothE);

    const jawBase = smoothIntensity * 0.04;
    const jawDynamic = visemePeak * 0.17 + visemeContrast * 0.11 + smoothAA * 0.1;
    const targetJaw = isSpeaking ? THREE.MathUtils.clamp(jawBase + jawDynamic, 0, 0.34) : 0;

    for (const jm of avatar.jawMeshes) {
        const inf = jm.mesh.morphTargetInfluences;

        inf[jm.jawOpen] = THREE.MathUtils.lerp(inf[jm.jawOpen], targetJaw, 0.26);

        if (jm.mouthOpen !== null) {
            inf[jm.mouthOpen] = THREE.MathUtils.lerp(
                inf[jm.mouthOpen],
                targetJaw * 0.3,
                0.22
            );
        }
    }
}

        renderer.render(scene, camera);
    }

    async function initAudioAndLipSync(url) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const audio = new Audio(url + '?t=' + Date.now());
        audio.crossOrigin = 'anonymous';
        const source = audioCtx.createMediaElementSource(audio);
        analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 128;
        source.connect(analyzer);
        analyzer.connect(audioCtx.destination);

        resetLipState();
        isSpeaking = true;
        setStatus('speaking', 'Parle');
        audio.addEventListener('ended', () => {
            isSpeaking = false;
            resetLipState();
            analyzer = null;
            setStatus('', 'Standby');
        });
        audio.play();
    }

    // Chat UI helpers
    function addMessage(role, text) {
        const t = document.getElementById('transcript');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<div class="msg-sender">${role === 'user' ? 'Vous' : 'ALIA'}</div>
                         <div class="msg-bubble">${escHtml(text)}</div>`;
        t.appendChild(div);
        t.scrollTop = t.scrollHeight;
    }

    function showThinking() {
        const t = document.getElementById('transcript');
        const div = document.createElement('div');
        div.className = 'msg alia'; div.id = 'thinking-bubble';
        div.innerHTML = `<div class="msg-sender">ALIA</div>
                         <div class="msg-thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        t.appendChild(div);
        t.scrollTop = t.scrollHeight;
    }

    function removeThinking() { document.getElementById('thinking-bubble')?.remove(); }

    function setStatus(cls, label) {
        const el = document.getElementById('status');
        el.className = `nav-status ${cls}`;
        el.textContent = label;
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function handleAction() {
        const input = document.getElementById('userInput');
        const text  = input.value.trim();
        if (!text || isProcessing) return;

        isProcessing = true;
        input.value  = '';
        input.disabled = true;
        document.getElementById('sendBtn').disabled = true;

        addMessage('user', text);
        showThinking();
        setStatus('thinking', 'Réflexion…');

        try {
            const res  = await fetch('/ask_alia', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ text })
            });
            const data = await res.json();

removeThinking();

if (!data.text) {
    addMessage('alia', "Réponse vide du serveur.");
    setStatus('', 'Erreur');
    return;
}
